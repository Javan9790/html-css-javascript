<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; padding-top: 50px; }
        .register-form { background-color: #E6E0F8; padding: 25px; border-radius: 15px; width: 350px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #1a1a1a; }
        hr { border: 0; border-top: 1px solid #ccc; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #444; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #d14141; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .footer-text { text-align: center; margin-top: 15px; font-size: 14px; }
        .footer-text a { color: blue; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-form">
        <h1>Register</h1>
        <hr>
        <form id="regForm">
            <label for="username">Username:</label>
        <input type="text" id="username" required>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" required>
            <label for="confirmpassword">Confirm password:</label>
            <input type="password" id="confirmPassword">
            <button type="submit">Register</button>
        </form>
         <div class="footer-text">
            Already have an account ? <a href="#">login</a>
            </div>
    </div>
    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Basic Validation
        if (username.length < 3) {
            alert("Username must be at least 3 characters long.");
            return;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters long.");
            return;
        }

        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }

        alert("Registration Successful!");
    });

</body>
</html>
